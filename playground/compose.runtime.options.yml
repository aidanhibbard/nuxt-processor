# Runtime-only host/port + lazyConnect + connectTimeout.
services:
  redis-runtime:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381"]

  app:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
      NUXT_REDIS_LAZY_CONNECT: "true"
      NUXT_REDIS_CONNECT_TIMEOUT: "15000"
    depends_on:
      - redis-runtime

  workers:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/workers/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
      NUXT_REDIS_LAZY_CONNECT: "true"
      NUXT_REDIS_CONNECT_TIMEOUT: "15000"
    depends_on:
      - redis-runtime
