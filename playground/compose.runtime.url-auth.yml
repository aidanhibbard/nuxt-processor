# Runtime-only Redis URL with password (no separate host/port env).
services:
  redis-runtime:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381", "--requirepass", "smoke-secret"]

  app:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/index.mjs"]
    environment:
      NUXT_REDIS_URL: redis://:smoke-secret@redis-runtime:6381/0
    depends_on:
      - redis-runtime

  workers:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/workers/index.mjs"]
    environment:
      NUXT_REDIS_URL: redis://:smoke-secret@redis-runtime:6381/0
    depends_on:
      - redis-runtime
