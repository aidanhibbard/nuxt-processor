services:
  redis-runtime:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381"]

  app:
    build:
      context: ..
      dockerfile: playground/Dockerfile
    command: ["node", ".output/server/index.mjs"]
    environment:
      REDIS_URL: redis://redis-runtime:6381/0
    depends_on:
      - redis-runtime

  workers:
    build:
      context: ..
      dockerfile: playground/Dockerfile
    environment:
      REDIS_URL: redis://redis-runtime:6381/0
    depends_on:
      - redis-runtime
