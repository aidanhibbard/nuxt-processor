# Runtime-only Redis via host/port/db/password (no URL).
services:
  redis-runtime:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381", "--requirepass", "smoke-secret"]

  app:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
      NUXT_REDIS_PASSWORD: smoke-secret
    depends_on:
      - redis-runtime

  workers:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/workers/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
      NUXT_REDIS_PASSWORD: smoke-secret
    depends_on:
      - redis-runtime
