# Runtime-only Redis via host/port/db (no URL) — image built without Redis env.
services:
  redis-runtime:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381"]

  app:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
    depends_on:
      - redis-runtime

  workers:
    image: ${NUXT_PROCESSOR_SMOKE_IMAGE:?Run scripts/docker-smoke.sh to build the image first}
    command: ["node", ".output/server/workers/index.mjs"]
    environment:
      NUXT_REDIS_HOST: redis-runtime
      NUXT_REDIS_PORT: "6381"
      NUXT_REDIS_DB: "0"
    depends_on:
      - redis-runtime
